name: Build APK

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Android SDK
        run: |
          SDK_ROOT="${ANDROID_SDK_ROOT:-/usr/local/lib/android/sdk}"
          echo "ANDROID_SDK_ROOT=$SDK_ROOT" >> "$GITHUB_ENV"
          echo "ANDROID_HOME=$SDK_ROOT" >> "$GITHUB_ENV"
          echo "SDK root: $SDK_ROOT"
          ls -la "$SDK_ROOT/" 2>/dev/null || echo "SDK root not found!"
          SDKMANAGER="$SDK_ROOT/cmdline-tools/latest/bin/sdkmanager"
          if [ ! -f "$SDKMANAGER" ]; then
            SDKMANAGER="$SDK_ROOT/tools/bin/sdkmanager"
          fi
          if [ -f "$SDKMANAGER" ]; then
            echo "Using sdkmanager: $SDKMANAGER"
            yes | "$SDKMANAGER" --licenses 2>&1 || true
            yes | "$SDKMANAGER" "platforms;android-34" "build-tools;34.0.0" 2>&1 || true
            echo "--- Installed platforms ---"
            "$SDKMANAGER" --list 2>&1 | grep "installed" | head -20 || true
          else
            echo "sdkmanager not found!"
          fi
          echo "--- Java version ---"
          java -version 2>&1 || true
          echo "--- Gradle version ---"

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Debug - check Gradle config
        run: ./gradlew --version --no-daemon 2>&1 || true

      - name: Build APK
        run: ./gradlew assembleDebug --no-daemon --stacktrace 2>&1

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/app-debug.apk
